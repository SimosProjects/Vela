services:
  postgres:
    restart: always
    ports: !reset []

  worker:
    image: ghcr.io/simosprojects/tradeflow-worker:latest
    restart: always
    environment:
      DOTNET_ENVIRONMENT: Production
      IBKR_ENABLED: ${IBKR_ENABLED}
      Analytics__ReportsDirectory: /app/reports
    volumes:
      - trades_data:/app/trades
      - reports_data:/app/reports

  api:
    image: ghcr.io/simosprojects/tradeflow-api:latest
    restart: always
    environment:
      DOTNET_ENVIRONMENT: Production

volumes:
  trades_data:
  reports_data: