name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB:       tradeflow_test
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore TradeFlow.sln

      - name: Build
        run: dotnet build TradeFlow.sln --configuration Release --no-restore

      - name: Unit Tests
        run: dotnet test TradeFlow.Tests/TradeFlow.Tests.csproj
          --configuration Release
          --no-build
          --filter "FullyQualifiedName!~Integration"
          --logger "trx;LogFileName=unit-results.trx"
          --results-directory ./test-results

      - name: Integration Tests
        run: dotnet test TradeFlow.Tests/TradeFlow.Tests.csproj
          --configuration Release
          --no-build
          --filter "FullyQualifiedName~Integration"
          --logger "trx;LogFileName=integration-results.trx"
          --results-directory ./test-results
        env:
          XTRADES_TOKEN: dummy-token-for-ci
          SKIP_IBKR_TESTS: true

      - name: Publish Test Results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Test Results
          path: './test-results/*.trx'
          reporter: dotnet-trx

  docker:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: TradeFlow.Worker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/tradeflow-worker:latest
            ghcr.io/${{ env.OWNER }}/tradeflow-worker:${{ github.sha }}

      - name: Build and Push Api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: TradeFlow.Api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/tradeflow-api:latest
            ghcr.io/${{ env.OWNER }}/tradeflow-api:${{ github.sha }}