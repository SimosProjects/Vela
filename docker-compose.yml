services:

  # PostgreSQL
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB:       vela
      POSTGRES_USER:     vela_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vela_user -d vela"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vela-net

  # Worker Service
  worker:
    build:
      context: .
      dockerfile: Vela.Worker/Dockerfile
    environment:
      ConnectionStrings__Vela: >-
        Host=postgres;Database=vela;
        Username=vela_user;Password=${POSTGRES_PASSWORD}
      XTRADES_TOKEN: ${XTRADES_TOKEN}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      DOTNET_ENVIRONMENT: Development
      IBKR_ENABLED: ${IBKR_ENABLED}
      Analytics__ReportsDirectory: /app/reports
    volumes:
      - trades_data:/app/trades
      - reports_data:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vela-net
    restart: unless-stopped

  # API
  api:
    build:
      context: .
      dockerfile: Vela.Api/Dockerfile
    environment:
      ConnectionStrings__Vela: >-
        Host=postgres;Database=vela;
        Username=vela_user;Password=${POSTGRES_PASSWORD}
      DOTNET_ENVIRONMENT: Development
    ports:
      - "5141:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vela-net
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vela-net
    restart: unless-stopped

volumes:
  postgres_data:
  trades_data:
  reports_data:
  grafana_data:
networks:
  vela-net:
    driver: bridge