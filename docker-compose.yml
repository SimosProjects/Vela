services:

  # PostgreSQL
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB:       tradeflow
      POSTGRES_USER:     tradeflow_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradeflow_user -d tradeflow"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tradeflow-net

  # Worker Service
  worker:
    build:
      context: .
      dockerfile: TradeFlow.Worker/Dockerfile
    environment:
      ConnectionStrings__TradeFlow: >-
        Host=postgres;Database=tradeflow;
        Username=tradeflow_user;Password=${POSTGRES_PASSWORD}
      XTRADES_TOKEN: ${XTRADES_TOKEN}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      DOTNET_ENVIRONMENT: Development
      IBKR_ENABLED: ${IBKR_ENABLED}
      Analytics__ReportsDirectory: /app/reports
    volumes:
      - trades_data:/app/trades
      - reports_data:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tradeflow-net
    restart: unless-stopped

  # API
  api:
    build:
      context: .
      dockerfile: TradeFlow.Api/Dockerfile
    environment:
      ConnectionStrings__TradeFlow: >-
        Host=postgres;Database=tradeflow;
        Username=tradeflow_user;Password=${POSTGRES_PASSWORD}
      DOTNET_ENVIRONMENT: Development
    ports:
      - "5141:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tradeflow-net
    restart: unless-stopped

volumes:
  postgres_data:
  trades_data:
  reports_data:

networks:
  tradeflow-net:
    driver: bridge